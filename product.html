<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Product</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;

      display: flex;
      justify-content: center;
      gap: 34px;

      padding: 22px;

      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);

      z-index: 999;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 15px;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    nav a:hover,
    nav a.active {
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    .hero {
      padding: 150px 20px 70px;
      text-align: center;
    }

    .hero h1 {
      font-size: 72px;
      margin-bottom: 18px;
      letter-spacing: 5px;
    }

    .hero p {
      color: #aaa;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .intro {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto 90px;
    }

    .intro img {
      width: 100%;
      display: block;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 0 28px rgba(255,255,255,0.12);
      transition: 0.35s ease;
    }

    .intro img:hover {
      transform: scale(1.01);
      box-shadow:
        0 0 28px rgba(0,255,255,0.45),
        0 0 56px rgba(0,255,255,0.18);
    }

    .series {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto 84px;
    }

    .series-title {
      margin-bottom: 28px;
      font-size: 34px;
      letter-spacing: 3px;
    }

    .product-showcase {
      display: grid;
      grid-template-columns: minmax(220px, 0.72fr) minmax(280px, 1fr);
      gap: 26px;
      align-items: stretch;
    }

    .product-object,
    .product-demo {
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
      transition: 0.35s ease;
    }

    .product-object:hover,
    .product-demo:hover {
      transform: translateY(-6px);
      border-color: rgba(0,255,255,0.65);
      box-shadow:
        0 0 28px rgba(0,255,255,0.55),
        0 0 56px rgba(0,255,255,0.22);
    }

    .product-object {
      display: flex;
      flex-direction: column;
    }

    .product-photo {
      flex: 1;
      min-height: 360px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(0,255,255,0.12), rgba(0,0,0,0.18) 58%);
    }

    .product-photo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      border-radius: 12px;
      cursor: pointer;
    }

    .product-demo img {
      width: 100%;
      height: 100%;
      min-height: 100%;
      display: block;
      object-fit: cover;
      cursor: pointer;
    }

    .lightbox {
      position: fixed;
      inset: 0;

      display: none;
      align-items: center;
      justify-content: center;

      padding: 28px;
      background: rgba(0,0,0,0.9);
      z-index: 5000;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      width: auto;
      max-width: 92vw;
      max-height: 88vh;
      display: block;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 0 32px rgba(255,255,255,0.14);
    }

    .product-info {
      padding: 20px;
    }

    .product-info h3 {
      margin-bottom: 10px;
      font-size: 22px;
      letter-spacing: 1px;
    }

    .product-info p {
      min-height: 52px;
      color: #aaa;
      line-height: 1.7;
      font-size: 15px;
    }

    .tag {
      display: inline-block;
      margin-top: 16px;
      padding: 7px 12px;
      border: 1px solid rgba(0,255,255,0.45);
      border-radius: 999px;
      color: cyan;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .series + .series {
      padding-top: 18px;
    }

    .coming-soon {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto 110px;
      padding: 52px 24px;
      border-top: 1px solid rgba(255,255,255,0.18);
      border-bottom: 1px solid rgba(255,255,255,0.18);
      text-align: center;
    }

    .coming-soon h2 {
      margin-bottom: 14px;
      font-size: 34px;
      letter-spacing: 3px;
    }

    .coming-soon p {
      color: #aaa;
      font-size: 17px;
      letter-spacing: 2px;
      line-height: 1.8;
    }

    footer {
      padding: 40px;
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.45);
    }

    @media (max-width: 768px) {
      nav {
        gap: 14px;
        padding: 18px 8px;
      }

      nav a {
        font-size: 11px;
        letter-spacing: 1px;
      }

      .hero h1 {
        font-size: 48px;
      }

      .hero p {
        font-size: 15px;
      }

      .series-title,
      .coming-soon h2 {
        font-size: 28px;
      }

      .product-showcase {
        grid-template-columns: 1fr;
      }

      .product-photo {
        min-height: 280px;
      }

      .product-demo img {
        height: auto;
        object-fit: contain;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">HOME</a>
    <a href="wall.html">WALL</a>
    <a href="product.html" class="active">PRODUCT</a>
    <a href="daily.html">DAILY</a>
    <a href="about.html">ABOUT</a>
    <a href="contact.html">CONTACT</a>
  </nav>

  <section class="hero">
    <h1>PRODUCT</h1>
    <p>TANGTANG SERIES</p>
  </section>

  <main>
    <section class="intro">
      <img src="image/prduct/product_demo.png" alt="糖糖系列商品總介紹" onclick="openLightbox(this.src)">
    </section>

    <section class="series">
      <h2 class="series-title">糖糖系列商品</h2>

      <div class="product-showcase">
        <article class="product-object">
          <div class="product-photo">
            <img src="image/prduct/keyhole.png" alt="糖糖鑰匙圈" onclick="openLightbox(this.src)">
          </div>
          <div class="product-info">
            <h3>糖糖鑰匙圈</h3>
            <p>把糖糖帶在日常物件上，透明去背圖讓主角更乾淨突出。</p>
            <span class="tag">KEYHOLE</span>
          </div>
        </article>

        <article class="product-demo">
          <img src="image/prduct/keyhole_demo.png" alt="糖糖鑰匙圈商品介紹" onclick="openLightbox(this.src)">
        </article>
      </div>
    </section>

    <section class="series">
      <div class="product-showcase">
        <article class="product-object">
          <div class="product-photo">
            <img src="image/prduct/cup.png" alt="糖糖杯子" onclick="openLightbox(this.src)">
          </div>
          <div class="product-info">
            <h3>糖糖杯子</h3>
            <p>適合放在桌面和日常裡的糖糖商品，保留簡單乾淨的視覺。</p>
            <span class="tag">CUP</span>
          </div>
        </article>

        <article class="product-demo">
          <img src="image/prduct/cup_demo.png" alt="糖糖杯子商品介紹" onclick="openLightbox(this.src)">
        </article>
      </div>
    </section>

    <section class="coming-soon">
      <h2>COMING SOON</h2>
      <p>含其他貓貓的商品正在準備中，敬請期待。</p>
    </section>
  </main>

  <footer>
    © 2026 551CAT Portfolio
  </footer>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" alt="">
  </div>

  <script>
    function openLightbox(src) {
      document.getElementById("lightbox").classList.add("active");
      document.getElementById("lightbox-img").src = src;
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("active");
    }
  </script>

</body>

</html>
