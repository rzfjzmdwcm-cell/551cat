<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain Portfolio</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .hero {
      height: 100vh;
      background-image: url("https://picsum.photos/1200/800");
      background-size: cover;
      background-position: center;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    p {
      font-size: 20px;
    }

    .gallery {
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>Rain Zhu</h1>
    <p>Personal Photo Portfolio</p>
  </section>

  <section class="gallery">
    <img src="https://picsum.photos/500/700?1">
    <img src="https://picsum.photos/500/700?2">
    <img src="https://picsum.photos/500/700?3">
  </section>

</body>
</html>
