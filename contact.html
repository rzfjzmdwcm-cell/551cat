<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;

      display: flex;
      justify-content: center;
      gap: 40px;

      padding: 22px;

      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);

      z-index: 999;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 15px;
      letter-spacing: 2px;

      transition: 0.3s;
    }

    nav a:hover,
    nav a.active {
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    .contact {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 28px;

      padding: 130px 20px 80px;
      text-align: center;
    }

    .contact h1 {
      font-size: 72px;
      letter-spacing: 5px;
    }

    .contact p {
      color: #aaa;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .ig-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      min-height: 54px;
      padding: 0 30px;
      border: 1px solid rgba(0, 255, 255, 0.6);
      border-radius: 999px;

      color: white;
      text-decoration: none;
      font-size: 18px;
      letter-spacing: 1px;

      transition: 0.3s ease;
      box-shadow: 0 0 20px rgba(0,255,255,0.18);
    }

    .ig-link:hover {
      color: cyan;
      transform: translateY(-2px);
      box-shadow:
        0 0 28px cyan,
        0 0 54px rgba(0,255,255,0.28);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 24px;
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.45);
    }

    @media (max-width: 768px) {
      nav {
        gap: 18px;
        padding: 18px 10px;
      }

      nav a {
        font-size: 12px;
      }

      .contact h1 {
        font-size: 48px;
      }

      .contact p,
      .ig-link {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">HOME</a>
    <a href="wall.html">WALL</a>
    <a href="product.html">PRODUCT</a>
    <a href="daily.html">DAILY</a>
    <a href="about.html">ABOUT</a>
    <a href="contact.html" class="active">CONTACT</a>
  </nav>

  <main class="contact">
    <h1>CONTACT</h1>
    <p>Follow us on Instagram</p>
    <a class="ig-link" href="https://www.instagram.com/ame.sweetie/" target="_blank" rel="noopener noreferrer">
      @ame.sweetie
    </a>
  </main>

  <footer>
    © 2026 551CAT Portfolio
  </footer>

</body>

</html>
